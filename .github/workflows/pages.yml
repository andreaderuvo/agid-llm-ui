name: Deploy galleria su GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd sota && npm ci
      - run: node sota/codegen.mjs
      - name: Bundle componenti comportamentali (Zag)
        run: cd sota && npx esbuild components-behavioral/index.mjs --bundle --format=iife --outfile=dist/it-behavioral.bundle.js --define:process.env.NODE_ENV='"production"'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sota/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
